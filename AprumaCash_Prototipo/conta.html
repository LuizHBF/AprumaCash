<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações da Conta</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            color: #000;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header img {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        h1 {
            margin: 0;
            font-size: 20px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            margin-bottom: 10px;
        }
        .section button:hover {
            background-color: #0056b3;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .button-group button {
            flex: 1;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .button-group button:hover {
            background-color: #0056b3;
        }
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }
        .dark-theme {
            background-color: #333;
            color: #fff;
        }
        .dark-theme .container {
            background-color: #444;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .dark-theme .section button, .dark-theme .button-group button {
            background-color: #1a73e8;
        }
        .dark-theme .section button:hover, .dark-theme .button-group button:hover {
            background-color: #0056b3;
        }
        .dark-theme .theme-toggle {
            background-color: #1a73e8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="settings-icon.png" alt="⚙️" onclick="window.location.href='configuracao.html'">
            <h1>Conta</h1>
            <img src="profile-icon.png" alt="🙋‍♂️" onclick="window.location.href='conta.html'">
        </div>
        <div class="section">
            <button onclick="window.location.href='add-account.html'">Adicionar conta</button>
            <button onclick="window.location.href='delete-account.html'">Apagar conta</button>
            <button onclick="window.location.href='update-email.html'">Endereço de email</button>
            <button onclick="window.location.href='change-password.html'">Mudar senha</button>
        </div>
        <div class="button-group">
            <button onclick="window.location.href='support.html'">Suporte</button>
            <button onclick="window.location.href='ambiente_ferramentas.html'">Voltar</button>
        </div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }
    </script>
</body>
</html>
