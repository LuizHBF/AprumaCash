<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente de Ferramentas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            color: #000;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
        }
        .header .icons {
            display: flex;
            gap: 10px;
        }
        .header .icons img {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        .box {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .box h2 {
            margin: 0 0 10px;
            font-size: 18px;
        }
        .box p {
            margin: 0 0 20px;
        }
        .box button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .box button:hover {
            background-color: #0056b3;
        }
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }
        .dark-theme {
            background-color: #333;
            color: #fff;
        }
        .dark-theme .box {
            background-color: #444;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .dark-theme .box button {
            background-color: #1a73e8;
        }
        .dark-theme .box button:hover {
            background-color: #0056b3;
        }
        .dark-theme .theme-toggle {
            background-color: #1a73e8;
        }
        @media (max-width: 1024px) {
            .container {
                padding: 15px;
            }
            .header h1 {
                font-size: 20px;
            }
        }
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .header h1 {
                font-size: 18px;
            }
        }
        @media (max-width: 480px) {
            .container {
                padding: 5px;
            }
            .header h1 {
                font-size: 16px;
            }
            .box {
                padding: 15px;
            }
            .box h2 {
                font-size: 16px;
            }
            .box button {
                font-size: 14px;
            }
            .theme-toggle {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="config-icon.png" alt="⚙️" onclick="window.location.href='configuracao.html'">
            <h1>Ambiente de Ferramentas</h1>
            <img src="profile-icon.png" alt="🙋‍♂️" onclick="window.location.href='conta.html'">
        </div>
        <div class="box">
            <h2>Título 1</h2>
            <p>Descrição da ferramenta 1.</p>
            <button onclick="window.location.href='ferramenta1.html'">Entrar na ferramenta</button>
        </div>
        <div class="box">
            <h2>Título 2</h2>
            <p>Descrição da ferramenta 2.</p>
            <button onclick="window.location.href='ferramenta2.html'">Entrar na ferramenta</button>
        </div>
        <!-- Adicione mais caixas conforme necessário -->
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }
    </script>
</body>
</html>
