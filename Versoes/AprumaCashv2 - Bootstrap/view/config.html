<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações</title>
    <link rel="shortcut icon" href="./img/favicon.svg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./styles/config.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background-color: #2CAA37;">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="index.html">
                <img id="logo" src="./img/logo_tema_claro.svg" alt="logo" height="50">
            </a>
            <h1 class="text-white h5 m-0">Configurações</h1>
            <div>
                <img id="iconU" src="./img/user_claro.svg" alt="Perfil" onclick="window.location.href='perfil.html'" width="30" class="me-3">
                <img id="iconS" src="./img/settings_claro.svg" alt="Configurações" onclick="window.location.href='config.html'" width="30">
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="card p-4 shadow">
            <div class="mb-3">
                <label for="language" class="form-label">Idioma</label>
                <select id="language" class="form-select">
                    <option value="pt">Português</option>
                    <option value="en">Inglês</option>
                    <option value="es">Espanhol</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Tema</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" id="light" name="theme" value="light" checked>
                    <label class="form-check-label" for="light">Claro</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" id="dark" name="theme" value="dark">
                    <label class="form-check-label" for="dark">Escuro</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" id="device" name="theme" value="device">
                    <label class="form-check-label" for="device">Dispositivo</label>
                </div>
            </div>

            <div class="d-flex justify-content-center gap-2">
                <button class="btn btn-outline-primary" onclick="saveSettings()">Salvar Alterações</button>
                <button class="btn btn-outline-primary" onclick="window.location.href='oficina.html'">Voltar</button>
            </div>
        </div>
    </div>
</body>
</html>
